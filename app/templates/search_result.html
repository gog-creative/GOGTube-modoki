{% extends "_base.html" %}
{% block title %}検索結果「{{ query }}」 | {{ site_name }}{% endblock %}

{% block content %}
<h1>「{{ query }}」の検索結果</h1>

<div class="grid">
{% for video in entries %}
    <form class="card" action="/request" method="POST">
        <input type="hidden" name="link" value="{{ video.url }}">
        <input type="hidden" name="file_type" value="video">
        <input type="hidden" name="play_directly" value="on">
        <input type="hidden" name="video_codec" value="">
        <input type="hidden" name="audio_codec" value="">
        <button type="submit">
            <img class="thumb" alt="サムネイル" src="{{ video['thumbnails'][-1]['url'] }}">
            <div class="meta">
                <h2>{{ video.title }}</h2>
                <p>{{ video.uploader }} / {{ video.view_count or 0 | int_f }} 回再生</p>
            </div>
        </button>
        <p class="meta" style="padding-top:0"><a href="{{ video.url }}">元リンク</a></p>
    </form>
{% endfor %}
</div>
{% endblock %}
